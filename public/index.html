<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script defer type="module" src="./app.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-[#971B2F]">
<script src="https://cdn.tailwindcss.com"></script>
<main class="max-w-xl mx-auto p-4 flex flex-col h-screen text-green-400 font-mono">

    <header class="mb-4 text-center border-b border-green-700 pb-2">
        <h1 class="text-2xl font-bold tracking-widest text-green-300">DEXTER</h1>
        <p class="text-sm text-green-500">Your Pokémon guide</p>
    </header>

    <section class="mb-4 bg-black border border-green-700 p-3 text-sm text-green-400">
        <p>
            Dexter helps you while playing Pokémon. Ask where to go next, where to find a specific Pokémon,
            or how something works in the game.
        </p>
        <p class="mt-2 text-green-600 italic">
            Example: "Where do I find Pikachu?" or "Where do I go after the second gym?"
        </p>
    </section>

    <div id="chat" class="flex-1 overflow-y-auto space-y-2 mb-4"></div>

    <form id="chatForm" class="flex gap-2">
        <input id="promptInput" type="text" placeholder="Ask something about Pokémon..." required
               class="flex-1 bg-black text-green-400 border border-green-500 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"/>
        <button id="submitBtn" class="bg-green-600 text-black px-4 py-2 font-bold hover:bg-green-400 disabled:opacity-50">
            SEND
        </button>
    </form>


</main>
</body>
</html>
